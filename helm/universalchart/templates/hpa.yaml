{{- if .Values.deployment.horizontalScaler.enabled }}
{{- $kubeVersion := .Capabilities.KubeVersion.Version -}}
{{- $useV2 := semverCompare ">=1.23.0-0" $kubeVersion -}}
{{- if $useV2 }}
apiVersion: autoscaling/v2
{{- else }}
apiVersion: autoscaling/v1
{{- end }}
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.appId }}
  labels:
    app: {{ .Values.appId }}
    {{- if .Values.labels }}
    {{- toYaml .Values.labels | nindent 4 }}
    {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.appId }}
  minReplicas: {{ .Values.deployment.horizontalScaler.minReplicas | default 1 }}
  maxReplicas: {{ .Values.deployment.horizontalScaler.maxReplicas | default 10 }}
  {{- if $useV2 }}
  {{- if .Values.deployment.horizontalScaler.metrics }}
  metrics:
    {{- toYaml .Values.deployment.horizontalScaler.metrics | nindent 4 }}
  {{- else }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.deployment.horizontalScaler.targetCPUUtilizationPercentage | default 80 }}
  {{- end }}
  {{- if .Values.deployment.horizontalScaler.behavior }}
  behavior:
    {{- toYaml .Values.deployment.horizontalScaler.behavior | nindent 4 }}
  {{- end }}
  {{- else }}
  {{- /* autoscaling/v1 only supports targetCPUUtilizationPercentage */}}
  {{- if .Values.deployment.horizontalScaler.targetCPUUtilizationPercentage }}
  targetCPUUtilizationPercentage: {{ .Values.deployment.horizontalScaler.targetCPUUtilizationPercentage }}
  {{- else if .Values.deployment.horizontalScaler.metrics }}
  {{- /* Extract CPU utilization from v2-style metrics for v1 API */}}
  {{- range .Values.deployment.horizontalScaler.metrics }}
  {{- if and (eq .type "Resource") (eq .resource.name "cpu") }}
  targetCPUUtilizationPercentage: {{ .resource.target.averageUtilization | default 80 }}
  {{- end }}
  {{- end }}
  {{- else }}
  targetCPUUtilizationPercentage: 80
  {{- end }}
  {{- end }}
{{- end }}